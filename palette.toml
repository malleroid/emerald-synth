# Emerald Synth — Color Palette
# Single source of truth for all theme formats

[meta]
name = "Emerald Synth"
author = "malleroid"
variant = "dark"

# ── Core ──────────────────────────────────────────────

[core]
bg = "#0d0221"
fg = "#f0e6ff"

[core.bg_shades]
darkest  = "#0a0118"
dark     = "#0d0221"
medium   = "#150530"

[core.fg_shades]
main     = "#f0e6ff"
dim      = "#60e0d0"

# ── Accent ────────────────────────────────────────────

[accent]
primary       = "#00ffcc"
primary_dim   = "rgba(0, 255, 204, 0.25)"
primary_text  = "#40ffdd"
foreground    = "#0d0221"
border        = "#00d4aa"

# ── Semantic ──────────────────────────────────────────

[semantic]
success = "#00ffcc"
warning = "#ff2a6d"
error   = "#ff2a6d"

# ── ANSI 16 ──────────────────────────────────────────

[ansi]
black          = "#0a0118"
red            = "#ff2a6d"
green          = "#00ffcc"
yellow         = "#ffcc66"
blue           = "#8b9cf7"
magenta        = "#ff79c6"
cyan           = "#4dd0e1"
white          = "#f0e6ff"

bright_black   = "#6a5585"
bright_red     = "#ff5c8a"
bright_green   = "#40ffdd"
bright_yellow  = "#ffe099"
bright_blue    = "#b0b8fc"
bright_magenta = "#ff9ed0"
bright_cyan    = "#7ee0ec"
bright_white   = "#ffffff"
